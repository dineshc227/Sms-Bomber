# Python CI/CD Pipeline for SMS Bomber Application
# Requirements:
# - Python 3.6 or higher
# - Chrome browser installed
# - Internet connection
# - For Python 3.12+: setuptools package (included in requirements.txt)

name: Python CI/CD Pipeline - SMS Bomber

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ── 1. LINT ────────────────────────────────────────────────
  lint:
    name: Lint SMS Bomber Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8 on sms_bomber.py
        run: flake8 sms_bomber.py --max-line-length=100

      - name: Run black on sms_bomber.py
        run: black --check sms_bomber.py

      - name: Run isort on sms_bomber.py
        run: isort --check-only sms_bomber.py

  # ── 2. RUN SMS BOMBER ──────────────────────────────────────
  run-sms-bomber:
    name: Run SMS Bomber (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install setuptools for Python 3.12+
        run: |
          python -m pip install --upgrade pip
          if [[ "${{ matrix.python-version }}" == "3.12" ]]; then
            pip install setuptools
          fi

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Common dependencies for SMS bombers
          pip install requests selenium beautifulsoup4 colorama

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome

      - name: Run SMS Bomber Script
        env:
          # Add any environment variables your script needs
          TARGET_NUMBER: ${{ secrets.TARGET_NUMBER }}  # For legitimate testing only
          MESSAGE_COUNT: ${{ secrets.MESSAGE_COUNT }}
          DELAY_SECONDS: ${{ secrets.DELAY_SECONDS }}
        run: |
          echo "Running SMS Bomber with Python ${{ matrix.python-version }}"
          echo "⚠️  WARNING: Only use this for authorized testing!"
          python sms_bomber.py --help || python sms_bomber.py -h
          
          # Uncomment below to actually run (use with CAUTION!)
          # python sms_bomber.py --target "$TARGET_NUMBER" --count "$MESSAGE_COUNT" --delay "$DELAY_SECONDS"
          
          # For testing, just verify the script runs without errors
          python -c "import sms_bomber; print('SMS Bomber module loaded successfully')"

      - name: Upload logs if any
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sms-bomber-logs-py${{ matrix.python-version }}
          path: |
            *.log
            *.txt

  # ── 3. TEST MODULE IMPORT ─────────────────────────────────
  test-import:
    name: Test SMS Bomber Import
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Test script syntax
        run: |
          python -m py_compile sms_bomber.py
          echo "✅ sms_bomber.py syntax is valid"

      - name: Check for required imports
        run: |
          python -c "
          import ast
          with open('sms_bomber.py', 'r') as f:
              tree = ast.parse(f.read())
          imports = [node.names[0].name.split('.')[0] for node in ast.walk(tree) if isinstance(node, ast.Import)]
          print(f'Found imports: {imports}')
          "

  # ── 4. SECURITY SCAN ──────────────────────────────────────
  security:
    name: Security Scan SMS Bomber
    runs-on: ubuntu-latest
    needs: [run-sms-bomber, test-import]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan on sms_bomber.py
        run: bandit sms_bomber.py -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ── 5. DEPLOY (Optional - for legitimate use only) ────────
  deploy:
    name: Deploy SMS Bomder (Authorized Only)
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || echo "No requirements.txt"

      - name: Verify script integrity
        run: |
          md5sum sms_bomber.py > sms_bomber.md5
          echo "SMS Bomber script prepared for deployment"
          echo "⚠️  LEGAL WARNING: Ensure you have authorization to use this tool"

      - name: Deploy script (example)
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "Deploying sms_bomber.py to authorized server..."
          # Add your deployment commands here
          # scp sms_bomber.py user@$SERVER_HOST:/opt/sms-tools/
          echo "Deployment complete"

      - name: Deployment success notification
        run: echo "✅ SMS Bomber deployed successfully (for authorized use only!)"
